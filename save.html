<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="fixed inset-0 z-50 flex justify-end">
        <!-- Fonni xiralashtirish (Backdrop) -->
        <div class="absolute inset-0 bg-black/20 backdrop-blur-sm"></div>

        <!-- Menyu paneli -->
        <div
            class="relative w-[85%] max-w-sm bg-white h-full shadow-2xl flex flex-col transform transition-transform duration-300">

            <!-- Yuqori qism: Logo va Yopish tugmasi -->
            <div class="flex items-center justify-between p-6 border-b border-gray-100">
                <div class="flex items-center gap-2">
                    <!-- Tenloc Logo imitatsiyasi -->
                    <div class="w-8 h-8 bg-[#FFD700] rounded-lg flex items-center justify-center">
                        <div class="w-4 h-4 bg-black rounded-sm rotate-45"></div>
                    </div>
                    <span class="text-2xl font-bold tracking-tight text-black">Tenloc</span>
                </div>

                <button class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-gray-500" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Menyu elementlari -->
            <nav class="flex-1 px-6 py-8 space-y-6">
                <a href="#"
                    class="group flex items-center justify-between text-xl font-medium text-gray-900 hover:text-[#FFD700] transition-colors">
                    Home
                    <span class="opacity-0 group-hover:opacity-100 transition-opacity text-[#FFD700]">→</span>
                </a>

                <a href="#"
                    class="group flex items-center justify-between text-xl font-medium text-gray-900 hover:text-[#FFD700] transition-colors">
                    О сервисе
                    <span class="opacity-0 group-hover:opacity-100 transition-opacity text-[#FFD700]">→</span>
                </a>

                <a href="#"
                    class="group flex items-center justify-between text-xl font-medium text-gray-900 hover:text-[#FFD700] transition-colors">
                    Блог
                    <span class="opacity-0 group-hover:opacity-100 transition-opacity text-[#FFD700]">→</span>
                </a>

                <a href="#"
                    class="group flex items-center justify-between text-xl font-medium text-gray-900 hover:text-[#FFD700] transition-colors">
                    Довольные клиенты
                    <span class="opacity-0 group-hover:opacity-100 transition-opacity text-[#FFD700]">→</span>
                </a>
            </nav>

            <!-- Pastki qism: Qo'shimcha tugma yoki kontaktlar -->
            <div class="p-6 mt-auto border-t border-gray-100">
                <button
                    class="w-full bg-[#FFD700] text-black font-bold py-4 rounded-2xl hover:shadow-lg hover:shadow-yellow-200 transition-all active:scale-[0.98]">
                    Забронировать
                </button>

                <div class="flex justify-center gap-6 mt-6">
                    <div
                        class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:text-black cursor-pointer transition-colors italic font-serif">
                        ig</div>
                    <div
                        class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:text-black cursor-pointer transition-colors italic font-serif">
                        tg</div>
                    <div
                        class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:text-black cursor-pointer transition-colors italic font-serif">
                        fb</div>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
